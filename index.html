<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Game Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#050505;--card-bg:rgba(15,15,15,0.95);--card-hover:rgba(30,30,30,1);--text:#e5e5e5;--text-muted:#525252;--border:rgba(255,255,255,0.08);--accent:#444}
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{display:none}
        body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding:20px;scrollbar-width:none}
        .bg{position:fixed;inset:0;z-index:-1;background:url(https://wallpapers.com/images/hd/mythical-1920-x-1080-background-ghfuhrbjpnyy19ut.jpg) center/cover no-repeat fixed;opacity:.3}
        .container{max-width:1200px;margin:0 auto;position:relative;z-index:2}
        .search-wrap{position:relative;width:100%;margin-bottom:20px}
        input{width:100%;padding:14px 20px;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:1rem;outline:0}
        input:focus{border-color: var(--accent)}
        #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
        .card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px 10px;text-align:center;cursor:pointer;transition:all .2s;min-height:100px;display:flex;align-items:center;justify-content:center}
        .card:hover{border-color:var(--accent);background:var(--card-hover);transform:translateY(-2px)}
        .name{font-size:.85rem;font-weight:500;color:#ccc}
        .hidden{display:none !important}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="search-wrap">
            <input id="s" placeholder="Zoek games..." autocomplete="off">
        </div>
        <main id="grid">Laden...</main>
    </div>

    <script>
        var COMMIT = "96e8e4e333a69bb2cc9f3df1794607296b55be33";
        var BASE = "https://cdn.jsdelivr.net/gh/HyperRushNet/c6xc@" + COMMIT + "/";
        var games = [];

        // Veilige wrapper voor Google Script functies
        const gasCall = (funcName, arg) => {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                if (arg) google.script.run[funcName](arg);
                else google.script.run.withSuccessHandler(res => console.log(res)).loadUserData();
            }
        };

        function init() {
            gasCall('loadUserData');

            fetch(BASE + "game-data.json")
                .then(r => r.json())
                .then(d => {
                    games = d;
                    render(games);
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("grid").innerText = "Fout bij laden van games.";
                });
        }

        function render(data) {
            const grid = document.getElementById("grid");
            const sorted = data.sort((a, b) => a.name.localeCompare(b.name));
            
            grid.innerHTML = sorted.map(game => `
                <div class="card" onclick="run('${game.path}', '${game.name}')">
                    <span class="name">${game.name}</span>
                </div>
            `).join('');
        }

        function run(path, name) {
            gasCall('saveUserData', name);

            const newWin = window.open('about:blank', '_blank');
            if (!newWin) return alert("Pop-up geblokkeerd! Sta pop-ups toe voor deze site.");

            newWin.document.write(`
                <html><body style="background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">
                    <p>Bezig met laden van ${name}...</p>
                </body></html>`);

            // Directe URL naar de index van de game
            const gameUrl = BASE + path + "/index.html";

            fetch(gameUrl)
                .then(r => r.text())
                .then(html => {
                    newWin.document.open();
                    // We voegen een <base> tag toe zodat relatieve paden (images/js) in de game blijven werken
                    const baseTag = `<base href="${BASE}${path}/">`;
                    newWin.document.write(baseTag + html);
                    newWin.document.close();
                })
                .catch(err => {
                    newWin.document.body.innerHTML = "Fout bij het laden van de game content.";
                });
        }

        // Zoekfunctie (efficiënter)
        document.getElementById("s").addEventListener('input', function(e) {
            const val = e.target.value.toLowerCase();
            const cards = document.querySelectorAll(".card");
            
            cards.forEach(card => {
                const name = card.querySelector('.name').textContent.toLowerCase();
                card.classList.toggle("hidden", !name.includes(val));
            });
        });

        init();
    </script>
</body>
</html>
