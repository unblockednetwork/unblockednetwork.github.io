<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #050505;
            color: #888;
            font-family: 'Courier New', Courier, monospace; /* Tech feel */
            padding: 20px;
            font-size: 14px;
            line-height: 2; /* Tight lines */
        }

        /* Header stuck to top */
        header {
            position: sticky;
            top: 0;
            background: #050505;
            padding: 10px 0 20px 0;
            border-bottom: 1px solid #111;
            margin-bottom: 10px;
            z-index: 100;
        }

        h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #fff;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            width: 100%;
            padding: 5px 0;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        /* THE WALL OF GAMES */
        /* Uses CSS Columns to create a dense newspaper/data layout */
        #wall {
            column-count: 4; 
            column-gap: 40px;
        }

        /* Make links look like data entries */
        .entry {
            display: inline-block; /* Keeps them flowing in columns */
            margin-bottom: 5px;
        }

        .entry a {
            color: #aaa;
            text-decoration: none;
            transition: color 0.1s;
        }

        .entry a:hover {
            color: #0f0; /* Matrix green on hover */
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }

        /* The separator adds to the "thousands" feeling */
        .separator {
            color: #222;
            margin: 0 5px;
            user-select: none;
        }

        /* Mobile responsive */
        @media (max-width: 1000px) { #wall { column-count: 3; } }
        @media (max-width: 700px) { #wall { column-count: 2; } }
        @media (max-width: 500px) { #wall { column-count: 1; } }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>Database Access // <span id="count">0</span> Files</h1>
    <input type="text" id="search" placeholder="FILTER DATA...">
</header>

<div id="wall"></div>

<script>
    fetch('https://unblockednetwork.github.io/games.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('count').textContent = data.length;
            const wall = document.getElementById('wall');
            
            // Build the wall
            data.forEach(game => {
                const span = document.createElement('span');
                span.className = 'entry';
                span.dataset.name = game.name.toLowerCase();
                
                // Link + Visual Separator
                span.innerHTML = `<a href="${game.path}">${game.name}</a><span class="separator">//</span>`;
                wall.appendChild(span);
            });
        });

    // Instant Search
    document.getElementById('search').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.entry').forEach(el => {
            const match = el.dataset.name.includes(term);
            el.classList.toggle('hidden', !match);
        });
    });
</script>

</body>
</html>
