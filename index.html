<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Mijn Documenten - OneDrive</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_arrow_favicon_5.ico">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #323130;
            --border: #edebe9;
            --accent: #0078d4;
            --hover: #f3f2f1;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 0; 
            overflow-x: hidden;
        }

        /* Header vermomming als Office/Drive */
        header {
            height: 48px;
            background: #0078d4;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .search-wrap { margin-bottom: 30px; }
        
        /* Input ziet eruit als een zakelijke zoekbalk */
        input { 
            width: 100%; 
            padding: 10px 15px; 
            border: 1px solid var(--border); 
            border-radius: 2px;
            font-size: 14px; 
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        input:focus { border-color: var(--accent); }

        /* Grid vermomming als "Bestanden" lijst */
        #grid { 
            display: flex; 
            flex-direction: column; 
            border-top: 1px solid var(--border);
        }

        .card { 
            display: flex; 
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
        }
        .card:hover { background: var(--hover); }

        /* Document icoontje simulatie */
        .card::before {
            content: "📄";
            margin-right: 15px;
            font-size: 18px;
            opacity: 0.6;
        }

        .name { font-size: 14px; font-weight: 400; color: #323130; }
        
        .hidden { display: none !important; }

        /* Overlay voor het laden */
        #status { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <span>Microsoft Office 365</span>
    </header>

    <div class="container">
        <div class="search-wrap">
            <input id="s" placeholder="Zoek in documenten..." autocomplete="off">
            <div id="status">Alle bestanden zijn up-to-date</div>
        </div>
        
        <main id="grid">Documenten ophalen...</main>
    </div>

    <script>
        var COMMIT = "96e8e4e333a69bb2cc9f3df1794607296b55be33";
        var BASE = "https://cdn.jsdelivr.net/gh/HyperRushNet/c6xc@" + COMMIT + "/";
        var games = [];

        // Panic Key: Druk op ESC om direct naar Google te gaan
        document.onkeydown = function(evt) {
            evt = evt || window.event;
            if (evt.keyCode == 27) {
                window.location.replace("https://www.google.com");
            }
        };

        const gasCall = (funcName, arg) => {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                if (arg) google.script.run[funcName](arg);
                else google.script.run.withSuccessHandler(res => {}).loadUserData();
            }
        };

        function init() {
            gasCall('loadUserData');
            fetch(BASE + "game-data.json")
                .then(r => r.json())
                .then(d => {
                    games = d;
                    render(games);
                })
                .catch(err => {
                    document.getElementById("grid").innerText = "Geen verbinding met server.";
                });
        }

        function render(data) {
            const grid = document.getElementById("grid");
            const sorted = data.sort((a, b) => a.name.localeCompare(b.name));
            
            grid.innerHTML = sorted.map(game => `
                <div class="card" onclick="run('${game.path}', '${game.name}')">
                    <span class="name">${game.name}.docx</span>
                </div>
            `).join('');
        }

        function run(path, name) {
            gasCall('saveUserData', name);
            const newWin = window.open('about:blank', '_blank');
            if (!newWin) return alert("Sta pop-ups toe.");

            // Stealth tab titel voor de game zelf
            newWin.document.write(`
                <html><head><title>Document - Word Online</title></head>
                <body style="margin:0;padding:0;background:#000;">
                    <div style="color:#333;font-family:sans-serif;padding:20px;">Laden...</div>
                </body></html>`);

            const gameUrl = BASE + path + "/index.html";

            fetch(gameUrl)
                .then(r => r.text())
                .then(html => {
                    newWin.document.open();
                    const baseTag = `<base href="${BASE}${path}/">`;
                    // Voegt een extra check toe: als je het tabblad verlaat, verandert de titel
                    const cloakScript = `<script>
                        document.addEventListener('visibilitychange', function() {
                            document.title = document.hidden ? "Mijn Documenten" : "Document - Word Online";
                        });
                    <\/script>`;
                    newWin.document.write(baseTag + cloakScript + html);
                    newWin.document.close();
                });
        }

        document.getElementById("s").addEventListener('input', function(e) {
            const val = e.target.value.toLowerCase();
            const cards = document.querySelectorAll(".card");
            cards.forEach(card => {
                const name = card.querySelector('.name').textContent.toLowerCase();
                card.classList.toggle("hidden", !name.includes(val));
            });
        });

        init();
    </script>
</body>
</html>
