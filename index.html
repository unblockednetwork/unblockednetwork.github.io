<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">
  <title>ZYNQ Hub | Games</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #09090b;
      --card: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --accent: #3b82f6;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Animated background glow */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.15), transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 4rem 1rem 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(to bottom, #fff, #64748b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .search-container {
      max-width: 500px;
      margin: 2rem auto;
      padding: 0 1rem;
      position: relative;
    }

    #search {
      width: 100%;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: white;
      font-size: 1rem;
      transition: all 0.2s ease;
      outline: none;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.25rem;
    }

    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.4s ease forwards;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      background: #202023;
    }

    .game-icon {
      width: 40px;
      height: 40px;
      margin-bottom: 1rem;
      color: var(--text-muted);
    }

    .game-card:hover .game-icon { color: var(--accent); }

    .game-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* States */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      header { padding: 2rem 1rem; }
      #grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>ZYNQ</h1>
  <div class="badge">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 12h4m-2-2v4m7-1h.01M2 6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6z"/></svg>
    <span id="counter">Initializing...</span>
  </div>
</header>

<div class="search-container">
  <input type="text" id="search" placeholder="Search for games..." spellcheck="false">
</div>

<main>
  <div id="grid"></div>
  <div id="empty-state" class="empty-state">
    <p>No games found matching your search.</p>
  </div>
</main>

<script>
  const grid = document.getElementById('grid');
  const searchInput = document.getElementById('search');
  const counter = document.getElementById('counter');
  const emptyState = document.getElementById('empty-state');

  let gamesStore = [];
  let rawData = {};

  const iconSVG = `
    <svg class="game-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      <path d="M9 10a1 1 0 11-2 0 1 1 0 012 0zm8 0a1 1 0 11-2 0 1 1 0 012 0z" />
      <path d="M15 15a3 3 0 01-6 0" />
    </svg>`;

  function formatTitle(str) {
    return str.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  function getPath(name) {
    return Object.keys(rawData).find(key => rawData[key].includes(name)) || 'g1';
  }

  function render(list) {
    grid.innerHTML = '';
    emptyState.style.display = list.length ? 'none' : 'block';
    
    list.forEach((game, i) => {
      const card = document.createElement('a');
      card.className = 'game-card';
      card.href = `./${getPath(game)}/${game}`;
      card.style.animationDelay = `${i * 20}ms`;
      card.innerHTML = `${iconSVG}<span class="game-name">${formatTitle(game)}</span>`;
      grid.appendChild(card);
    });
  }

  async function loadGames() {
    try {
      const res = await fetch('./games.json');
      rawData = await res.json();
      gamesStore = Object.values(rawData).flat().sort();
      
      counter.textContent = `${gamesStore.length} Games Available`;
      render(gamesStore);
    } catch (err) {
      counter.textContent = "Error loading database";
      console.error(err);
    }
  }

  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = gamesStore.filter(g => g.toLowerCase().includes(term));
    render(filtered);
  });

  loadGames();
</script>

</body>
</html>
