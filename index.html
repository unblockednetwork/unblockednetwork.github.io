<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "e7ca3a68f0c04656baf422e837d316d4"}'></script>

  <title>ZYNQ | Games</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.3/index.min.js"></script>

  <style>
    :root {
      --bg: #08090d;
      --bg-elevated: #0f1117;
      --bg-card: #14161e;
      --border: #1e2230;
      --border-subtle: #161924;
      --text: #e8eaed;
      --text-muted: #6b7280;
      --text-dim: #404556;
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.25);
      --accent-soft: rgba(0, 229, 255, 0.08);
      --hot: #ff5c4d;
      --hot-glow: rgba(255, 92, 77, 0.25);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(255, 92, 77, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    #app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 32px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, #00b8d4 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--bg);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .stats-pill {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .stats-pill strong { color: var(--accent); font-weight: 600; }

    .stats-divider {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .search-section {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .search-wrapper { flex: 1; position: relative; }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 14px 16px 14px 48px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search-input:focus + .search-icon { color: var(--accent); }

    .btn-random {
      background: linear-gradient(135deg, var(--hot) 0%, #ff7a6b 100%);
      border: none;
      color: white;
      padding: 0 24px;
      border-radius: var(--radius);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px var(--hot-glow);
    }

    .btn-random:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--hot-glow);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 32px 0 16px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    /* 6 cards per rij */
    .featured-grid,
    .games-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 18px;
    }

    .game-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      height: 100%;
      cursor: pointer;
    }

    .game-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 15px 45px rgba(0, 229, 255, 0.18);
    }

    .splash-container {
      position: relative;
      padding-top: 75%; /* 4:3 aspect ratio */
      background: #0a0c12;
      overflow: hidden;
    }

    .splash {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .game-card:hover .splash {
      transform: scale(1.08);
    }

    .game-info {
      padding: 16px 18px;
    }

    .game-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15.5px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 14px 24px;
      border-radius: var(--radius);
      font-size: 14.5px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Responsief */
    @media (max-width: 1280px) {
      .featured-grid,
      .games-grid { grid-template-columns: repeat(5, 1fr); }
    }

    @media (max-width: 1024px) {
      .featured-grid,
      .games-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 768px) {
      #app { padding: 0 16px 60px; }
      .header-top { flex-direction: column; align-items: flex-start; gap: 16px; }
      .search-section { flex-direction: column; }
      .btn-random { width: 100%; justify-content: center; padding: 14px; }
      
      .featured-grid,
      .games-grid { 
        grid-template-columns: repeat(3, 1fr); 
        gap: 14px; 
      }
    }

    @media (max-width: 480px) {
      .featured-grid,
      .games-grid { grid-template-columns: repeat(2, 1fr); }
    }
      </style>
</head>

<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">
        <div class="logo-mark">Z</div>
        <div class="logo-text">ZYNQ <span>Games</span></div>
      </div>

      <div class="stats-pill">
        <span><strong id="count-text">0</strong> games</span>
        <div class="stats-divider"></div>
        <span>uptime <strong id="uptime">0s</strong></span>
      </div>
    </div>

    <div class="search-section">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="search" placeholder="Search games..." autocomplete="off">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
      </div>

      <button class="btn-random" id="random-btn">
        🎲 I'm bored
      </button>
    </div>
  </header>

  <main>
    <div class="section-header">
      <div class="section-title">Featured</div>
    </div>
    <div class="featured-grid" id="featured-container"></div>

    <div class="section-header">
      <div class="section-title">All Games</div>
    </div>
    <div class="games-grid" id="games-container"></div>
  </main>

  <div id="toast" class="toast"></div>
</div>

<script type="module">
  const featuredContainer = document.getElementById('featured-container');
  const gamesContainer = document.getElementById('games-container');
  const searchInput = document.getElementById('search');
  const countEl = document.getElementById('count-text');
  const randomBtn = document.getElementById('random-btn');
  const uptimeEl = document.getElementById('uptime');
  const toast = document.getElementById('toast');

  let allGames = [];
  let startTime = Date.now();

  setInterval(() => {
    const s = Math.floor((Date.now() - startTime) / 1000);
    uptimeEl.textContent = s < 60 ? `${s}s` : `${Math.floor(s/60)}m`;
  }, 1000);

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function createGameCard(game) {
    const card = document.createElement('a');
    card.className = 'game-card';
    card.href = `./game/${game.alias}`;

    card.innerHTML = `
      <div class="splash-container">
        <img src="${game.splash || game.thumb}" class="splash" loading="lazy">
      </div>
      <div class="game-info">
        <div class="game-title">${game.name}</div>
      </div>
    `;

    return card;
  }

  function renderFeatured(games) {
    featuredContainer.innerHTML = '';
    games.slice(0, 12).forEach(g => {
      featuredContainer.appendChild(createGameCard(g));
    });
  }

  function renderAll(games) {
    gamesContainer.innerHTML = '';

    if (!games.length) {
      gamesContainer.innerHTML = `<div class="empty-state">Geen games gevonden</div>`;
      return;
    }

    games.forEach(g => {
      gamesContainer.appendChild(createGameCard(g));
    });
  }

  async function init() {
    try {
      if (!window.ZYNQ?.games) {
        throw new Error("ZYNQ library not loaded");
      }

      await window.ZYNQ.games.init();

      // 🔥 FIX: gebruik veilige fallback voor API variatie
      allGames =
        window.ZYNQ.games.list ||
        window.ZYNQ.games.all?.() ||
        [];

      countEl.textContent = allGames.length;

      renderFeatured(allGames);
      renderAll(allGames);

      searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim();

        if (!q) return renderAll(allGames);

        const res = window.ZYNQ.games.search(q);
        renderAll(res || []);
      });

      randomBtn.addEventListener('click', () => {
        const g =
          window.ZYNQ.games.getRandomOne?.() ||
          window.ZYNQ.games.random?.() ||
          window.ZYNQ.games.random?.(1)?.[0];

        if (!g) return;

        showToast(`Opening ${g.name}...`);

        setTimeout(() => {
          window.location.href = `./game/${g.alias}`;
        }, 250);
      });

    } catch (err) {
      console.error("ZYNQ init error:", err);

      gamesContainer.innerHTML =
        `<div class="empty-state">ZYNQ failed to load 😢 check console</div>`;
    }
  }

  document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
