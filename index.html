<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: system-ui, sans-serif;
            background-color: #000;
            /* Cool minimal grid background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 30px;
            border-bottom: 1px solid #222;
            padding-bottom: 12px;
        }
        .tab {
            background: none;
            border: none;
            color: #555;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; margin-bottom: -13px; }
        .tab:hover { color: #ccc; }

        /* Views */
        .view { display: none; }
        .view.active { display: block; }

        /* Search */
        .search {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: #fff;
            margin-bottom: 20px;
            font-size: 14px;
            outline: none;
        }
        .search:focus { border-color: #fff; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #222;
            padding: 24px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            color: #fff;
            transition: all 0.2s;
        }
        .card:hover { 
            background: rgba(255,255,255,0.08); 
            border-color: #444; 
        }

        /* Settings */
        .setting {
            background: rgba(255,255,255,0.03);
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 12px;
        }
        .setting h4 { font-size: 14px; margin-bottom: 4px; color: #fff; }
        .setting p { font-size: 12px; color: #666; margin-bottom: 12px; }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        input[type="text"]:focus, select:focus { border-color: #fff; }

        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }

        /* Toggle */
        .toggle-wrap { display: flex; justify-content: space-between; align-items: center; }
        .toggle { width: 44px; height: 24px; background: #222; position: relative; cursor: pointer; }
        .toggle.on { background: #fff; }
        .toggle::after {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            top: 3px;
            left: 3px;
        }
        .toggle.on::after { left: 23px; background: #000; }

        /* Button */
        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-ghost { background: transparent; border: 1px solid #333; color: #fff; }

        /* Modal */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }
        .modal-box {
            background: #050505;
            border: 1px solid #222;
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }
        .modal-box h3 { margin-bottom: 20px; font-size: 18px; color: #fff; }
        .modal-box input, .modal-box textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 10px;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            font-size: 13px;
        }
        .modal-box textarea { height: 80px; resize: none; font-family: monospace; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab active" data-view="games">Games</button>
        <button class="tab" data-view="tools">Tools</button>
        <button class="tab" data-view="settings">Instellingen</button>
    </div>

    <div id="view-games" class="view active">
        <input type="text" class="search" id="search" placeholder="Zoeken...">
        <div class="grid" id="games-grid"></div>
    </div>

    <div id="view-tools" class="view">
        <div class="grid" id="tools-grid"></div>
        <button class="btn" style="margin-top:20px;" onclick="openModal()">+ Tool Toevoegen</button>
    </div>

    <div id="view-settings" class="view">
        <div class="setting">
            <div class="toggle-wrap">
                <div>
                    <h4>About:Blank Cloak</h4>
                    <p>Opent in leeg venster</p>
                </div>
                <div class="toggle on" id="toggle-ab" onclick="toggleAB()"></div>
            </div>
        </div>
        <div class="setting">
            <h4>Venster Titel</h4>
            <p>Titel voor about:blank venster</p>
            <input type="text" id="ab-title" placeholder="Loading...">
        </div>
        <div class="setting">
            <h4>Tab Cloak</h4>
            <p>Verander tab uiterlijk</p>
            <select id="cloak-select">
                <option value="default">Portal</option>
                <option value="google">Google</option>
                <option value="classroom">Classroom</option>
                <option value="drive">Drive</option>
                <option value="docs">Docs</option>
            </select>
        </div>
        <div class="setting">
            <h4>Panic Key</h4>
            <p>Druk toets om te vluchten</p>
            <div class="row">
                <input type="text" id="panic-key" placeholder="`" style="width:70px; text-align:center;" readonly>
                <input type="text" id="panic-url" placeholder="https://google.com">
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h3>Tool Toevoegen</h3>
            <input type="text" id="bm-name" placeholder="Naam">
            <textarea id="bm-code" placeholder="javascript:..."></textarea>
            <div class="modal-btns">
                <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
                <button class="btn" onclick="saveTool()">Opslaan</button>
            </div>
        </div>
    </div>

    <script>
        var BASE = "https://cdn.jsdelivr.net/gh/HyperRushNet/c6xc@96e8e4e333a69bb2cc9f3df1794607296b55be33/";
        
        var games = [];
        var tools = []; // Start leeg
        var cfg = { panicKey: '`', panicUrl: 'https://google.com', cloak: 'default', abOn: true, abTitle: '' };

        // Init
        loadCfg();
        loadGames();
        loadTools();
        bindEvents();

        function loadCfg() {
            var s = localStorage.getItem('cfg');
            if (s) cfg = JSON.parse(s);
            document.getElementById('ab-title').value = cfg.abTitle || '';
            document.getElementById('cloak-select').value = cfg.cloak || 'default';
            document.getElementById('panic-key').value = cfg.panicKey || '`';
            document.getElementById('panic-url').value = cfg.panicUrl || '';
            document.getElementById('toggle-ab').className = cfg.abOn ? 'toggle on' : 'toggle';
            applyCloak();
        }

        function saveCfg() {
            cfg.abTitle = document.getElementById('ab-title').value;
            cfg.cloak = document.getElementById('cloak-select').value;
            cfg.panicKey = document.getElementById('panic-key').value;
            cfg.panicUrl = document.getElementById('panic-url').value;
            localStorage.setItem('cfg', JSON.stringify(cfg));
            applyCloak();
        }

        function applyCloak() {
            var maps = {
                default: ['Portal', 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23000" width="100" height="100"/></svg>'],
                google: ['Google', 'https://www.google.com/favicon.ico'],
                classroom: ['Home', 'https://www.gstatic.com/classroom/logo_square_rounded.svg'],
                drive: ['My Drive', 'https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png'],
                docs: ['Google Docs', 'https://www.gstatic.com/images/branding/product/1x/docs_2020q4_48dp.png']
            };
            var c = maps[cfg.cloak] || maps.default;
            document.title = c[0];
            var link = document.querySelector('link[rel="icon"]');
            if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                document.head.appendChild(link);
            }
            link.href = c[1];
        }

        function toggleAB() {
            cfg.abOn = !cfg.abOn;
            document.getElementById('toggle-ab').className = cfg.abOn ? 'toggle on' : 'toggle';
            saveCfg();
        }

        function bindEvents() {
            // Tabs
            document.querySelectorAll('.tab').forEach(function(t) {
                t.onclick = function() {
                    document.querySelectorAll('.tab').forEach(function(x) { x.className = 'tab'; });
                    document.querySelectorAll('.view').forEach(function(x) { x.className = 'view'; });
                    t.className = 'tab active';
                    document.getElementById('view-' + t.dataset.view).className = 'view active';
                };
            });

            // Search
            document.getElementById('search').oninput = function(e) {
                var q = e.target.value.toLowerCase();
                document.querySelectorAll('.game-card').forEach(function(c) {
                    c.style.display = c.dataset.name.indexOf(q) > -1 ? '' : 'none';
                });
            };

            // Settings inputs
            document.getElementById('ab-title').onchange = saveCfg;
            document.getElementById('cloak-select').onchange = saveCfg;
            document.getElementById('panic-url').onchange = saveCfg;
            document.getElementById('panic-key').onkeydown = function(e) {
                e.preventDefault();
                e.target.value = e.key.toUpperCase();
                cfg.panicKey = e.key;
                saveCfg();
            };

            // Panic
            document.onkeydown = function(e) {
                if (e.key === cfg.panicKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                    window.location.replace(cfg.panicUrl);
                }
            };
        }

        function loadGames() {
            fetch(BASE + 'game-data.json')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    games = d.sort(function(a, b) { return a.name.localeCompare(b.name); });
                    renderGames();
                })
                .catch(function() {
                    document.getElementById('games-grid').innerText = 'Fout bij laden';
                });
        }

        function renderGames() {
            var html = games.map(function(g) {
                return '<div class="card game-card" data-name="' + g.name.toLowerCase() + '" onclick="launch(\'' + g.path + '\')">' + g.name + '</div>';
            }).join('');
            document.getElementById('games-grid').innerHTML = html;
        }

        function launch(path) {
            var url = BASE + path + '/index.html';
            if (cfg.abOn) {
                var win = window.open('about:blank', '_blank');
                if (!win) return alert('Pop-up geblokkeerd');
                win.document.write('<html><head><title>' + (cfg.abTitle || 'Loading...') + '</title></head><body style="background:#000;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;">Laden...</body></html>');
                fetch(url).then(function(r) { return r.text(); }).then(function(html) {
                    win.document.open();
                    win.document.write(html.replace('<head>', '<head><base href="' + BASE + path + '/">'));
                    win.document.close();
                });
            } else {
                window.open(url, '_blank');
            }
        }

        function loadTools() {
            var saved = localStorage.getItem('tools');
            if (saved) tools = JSON.parse(saved); // Alleen laden als er opgeslagen tools zijn
            renderTools();
        }

        function renderTools() {
            if (tools.length === 0) {
                document.getElementById('tools-grid').innerHTML = '<p style="color:#555; grid-column: 1/-1;">Nog geen tools toegevoegd.</p>';
                return;
            }
            var html = tools.map(function(t) {
                return '<div class="card"><div>' + t.name + '</div><a href="' + t.code + '" style="color:#666;font-size:11px; margin-top:8px; display:block; text-decoration:none;">Run</a></div>';
            }).join('');
            document.getElementById('tools-grid').innerHTML = html;
        }

        function openModal() {
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('bm-name').value = '';
            document.getElementById('bm-code').value = '';
        }

        function saveTool() {
            var n = document.getElementById('bm-name').value;
            var c = document.getElementById('bm-code').value;
            if (!n || !c) return;
            if (c.indexOf('javascript:') !== 0) c = 'javascript:' + c;
            tools.push({ name: n, code: c });
            localStorage.setItem('tools', JSON.stringify(tools));
            renderTools();
            closeModal();
        }
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/>">
</body>
</html>
