<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e7ca3a68f0c04656baf422e837d316d4"}'></script>
  <title>ZYNQ | Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090d;
      --bg-elevated: #0f1117;
      --bg-card: #14161e;
      --border: #1e2230;
      --border-subtle: #161924;
      --text: #e8eaed;
      --text-muted: #6b7280;
      --text-dim: #404556;
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.25);
      --accent-soft: rgba(0, 229, 255, 0.08);
      --hot: #ff5c4d;
      --hot-glow: rgba(255, 92, 77, 0.25);
      --success: #22c55e;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(255, 92, 77, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 32px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, #00b8d4 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--bg);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .stats-pill {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .stats-pill strong {
      color: var(--accent);
      font-weight: 600;
    }

    .stats-divider {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .search-section {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .search-wrapper {
      flex: 1;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      transition: color 0.2s;
    }

    .search-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 14px 16px 14px 48px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search-input:focus + .search-icon { color: var(--accent); }

    .btn-random {
      background: linear-gradient(135deg, var(--hot) 0%, #ff7a6b 100%);
      border: none;
      color: white;
      padding: 0 24px;
      border-radius: var(--radius);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 0 4px 16px var(--hot-glow);
    }

    .btn-random:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--hot-glow);
    }

    .btn-random:active { transform: translateY(0); }

    .tabs-wrapper {
      margin-top: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs-wrapper::-webkit-scrollbar { display: none; }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      width: max-content;
    }

    .tab {
      background: transparent;
      border: none;
      padding: 10px 18px;
      border-radius: calc(var(--radius) - 4px);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }

    .tab.active {
      background: var(--bg-card);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .tab .count {
      font-size: 11px;
      padding: 2px 6px;
      background: var(--border-subtle);
      border-radius: 100px;
      color: var(--text-dim);
    }

    .tab.active .count {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      margin-top: 32px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .hot-badge {
      background: var(--hot);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .featured-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 16px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .featured-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, var(--accent-soft) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .featured-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px var(--accent);
    }

    .featured-card:hover::before { opacity: 1; }

    .featured-emoji {
      width: 44px;
      height: 44px;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .featured-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .featured-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .featured-tag {
      font-size: 12px;
      color: var(--text-dim);
    }

    .recent-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .recent-chip {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .recent-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .game-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .game-card::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s;
    }

    .game-card:hover {
      border-color: var(--border);
      background: var(--bg-elevated);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .game-card:hover::after {
      transform: scaleY(1);
    }

    .game-card:hover .card-emoji {
      transform: scale(1.1);
    }

    .game-card:active {
      transform: translateY(0);
      background: var(--bg);
    }

    .card-emoji {
      width: 48px;
      height: 48px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .card-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--accent);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @media (max-width: 768px) {
      #app { padding: 0 16px 60px; }
      
      header {
        padding: 20px 0 16px;
        margin-bottom: 20px;
      }

      .header-top {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .stats-pill {
        width: 100%;
        justify-content: center;
      }

      .search-section {
        flex-direction: column;
      }

      .btn-random {
        width: 100%;
        justify-content: center;
        padding: 14px;
      }

      .featured-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .games-grid {
        grid-template-columns: 1fr;
      }

      .game-card {
        padding: 14px 16px;
      }
    }

    @media (max-width: 480px) {
      .featured-grid {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .featured-card {
        padding: 12px;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .featured-emoji {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      .featured-title {
        font-size: 13px;
      }

      .tabs {
        width: 100%;
      }

      .tab {
        flex: 1;
        justify-content: center;
        padding: 10px 12px;
      }

      .tab .count {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

    'parking-fury-2': '🅿️', 'parking-fury-3': '🅿️', 'granny': '👵',
    'catapult-quest': '🎯', 'adventure-drivers': '🚙', 'axis-football-league': '🏈',

  };

  const container = document.getElementById('games-container');
  const featuredContainer = document.getElementById('featured-container');
  const recentContainer = document.getElementById('recent-container');
  const recentSection = document.getElementById('recent-section');
  const featuredSection = document.getElementById('featured-section');
  const categoryTabs = document.getElementById('category-tabs');
  const gamesLabel = document.getElementById('games-label');
  const searchInput = document.getElementById('search');
  const gameCountEl = document.getElementById('count-text');
  const randomBtn = document.getElementById('random-btn');
  const uptimeEl = document.getElementById('uptime');
  const toast = document.getElementById('toast');
  
  async function getData() {
    const res = await fetch("/games.json");
    return await res.json();
  }

  const NEW_GAME_DATA = await getData();

  let allGameData = {};
  let allGames = [];
  let currentCategory = 'all';

  let startTime = Date.now();
  setInterval(() => {
    let s = Math.floor((Date.now() - startTime) / 1000);
    uptimeEl.textContent = s < 60 ? `${s}s` : `${Math.floor(s/60)}m`;
  }, 1000);

  function formatName(name) {
    return name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  }

  function getGameEmoji(gameId) {
    if (GAME_EMOJIS[gameId]) return GAME_EMOJIS[gameId];
    for (const [, catData] of Object.entries(CATEGORIES)) {
      if (catData.games?.includes(gameId)) return catData.icon || '🎮';
    }
    return '🎮';
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function saveRecent(game) {
    let recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    recent = [game, ...recent.filter(g => g !== game)].slice(0, 6);
    localStorage.setItem('recentGames', JSON.stringify(recent));
    renderRecent();
  }

  function renderCategoryTabs() {
    categoryTabs.innerHTML = '';
    Object.keys(CATEGORIES).forEach(key => {
      const cat = CATEGORIES[key];
      const count = key === 'all' ? allGames.length : 
                    key === 'popular' ? FEATURED_GAMES.length :
                    (cat.games?.filter(g => allGames.includes(g)).length || 0);
      const btn = document.createElement('button');
      btn.className = `tab ${currentCategory === key ? 'active' : ''}`;
      btn.innerHTML = `${cat.icon} ${cat.name}<span class="count">${count}</span>`;
      btn.onclick = () => {
        currentCategory = key;
        renderCategoryTabs();
        renderGames(getFilteredGames());
        featuredSection.style.display = (key === 'all') ? 'block' : 'none';
        gamesLabel.textContent = key === 'all' ? 'All Games' : cat.name;
      };
      categoryTabs.appendChild(btn);
    });
  }

  function getFilteredGames() {
    if (currentCategory === 'all') return allGames;
    if (currentCategory === 'popular') return FEATURED_GAMES.map(f => f.id).filter(g => allGames.includes(g));
    if (CATEGORIES[currentCategory]?.games) {
      return CATEGORIES[currentCategory].games.filter(g => allGames.includes(g));
    }
    return allGames;
  }

  function renderFeatured() {
    featuredContainer.innerHTML = '';
    FEATURED_GAMES.forEach((f, i) => {
      if (!allGames.includes(f.id)) return;
      const card = document.createElement('a');
      card.className = 'featured-card animate-in';
      card.style.animationDelay = `${i * 0.05}s`;
      card.href = `./game/${f.id}`;
      card.onclick = () => saveRecent(f.id);
      card.innerHTML = `
        <div class="featured-emoji">${f.emoji}</div>
        <div class="featured-info">
          <div class="featured-title">${formatName(f.id)}</div>
          <div class="featured-tag">${f.tag}</div>
        </div>
      `;
      featuredContainer.appendChild(card);
    });
  }

  function renderRecent() {
    const recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    recentSection.style.display = recent.length ? 'block' : 'none';
    recentContainer.innerHTML = '';
    recent.forEach(game => {
      if (!allGames.includes(game)) return;
      const chip = document.createElement('a');
      chip.className = 'recent-chip';
      chip.href = `./game/${game}`;
      chip.onclick = () => saveRecent(game);
      chip.innerHTML = `<span>${getGameEmoji(game)}</span> ${formatName(game)}`;
      recentContainer.appendChild(chip);
    });
  }

  function createCard(game, index) {
    const card = document.createElement('a');
    card.className = 'game-card animate-in';
    card.style.animationDelay = `${Math.min(index * 0.02, 0.5)}s`;
    card.href = `./game/${game}`;
    
    card.onclick = () => saveRecent(game);

    const emoji = getGameEmoji(game);
    
    card.innerHTML = `
      <div class="card-emoji">${emoji}</div>
      <div class="card-content">
        <div class="card-title">${formatName(game)}</div>
      </div>
    `;
    return card;
  }

  function renderGames(games) {
    container.innerHTML = '';
    if (!games.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div>No games found</div>';
      return;
    }
    games.forEach((g, i) => container.appendChild(createCard(g, i)));
  }

  function init() {
    allGameData = NEW_GAME_DATA;
    allGames = Object.values(allGameData).flat();
    gameCountEl.textContent = allGames.length;
    
    renderCategoryTabs();
    renderFeatured();
    renderGames(allGames);
    renderRecent();
  }

  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const baseGames = getFilteredGames();
    if (!query) {
      renderGames(baseGames);
      featuredSection.style.display = currentCategory === 'all' ? 'block' : 'none';
      return;
    }
    const filtered = baseGames.filter(gameId => 
      formatName(gameId).toLowerCase().includes(query)
    );
    renderGames(filtered);
    featuredSection.style.display = 'none';
  });

  randomBtn.addEventListener('click', () => {
    if(!allGames.length) return;
    const game = allGames[Math.floor(Math.random() * allGames.length)];
    saveRecent(game);
    showToast(`Loading ${formatName(game)}...`);
    setTimeout(() => window.location.href = `./game/${game}`, 350);
  });

  init();
</script>
