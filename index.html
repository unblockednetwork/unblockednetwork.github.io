<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">
  <title>ZYNQ (UN) - Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #09090b;
      --bg-secondary: #111113;
      --card-bg: #18181b;
      --card-border: #27272a;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent-color: #3b82f6;
      --accent-secondary: #2563eb;
      --accent-glow: rgba(59, 130, 246, 0.2);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Background Effects */
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%);
      pointer-events: none; z-index: 0;
    }

    header { text-align: center; padding: 4rem 1rem 2rem; position: relative; z-index: 1; }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-badge {
      font-size: 0.85rem; color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.03);
      padding: 0.5rem 1.25rem; border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem;
    }

    /* Search & Tools */
    .controls-wrapper {
      max-width: 700px; margin: 0 auto 2rem; padding: 0 1rem;
      display: flex; gap: 10px; position: relative; z-index: 10;
    }

    .search-container { position: relative; flex-grow: 1; }

    #search {
      width: 100%; padding: 1rem 1rem 1rem 3rem;
      border-radius: var(--radius-md); border: 1px solid var(--card-border);
      background: var(--card-bg); color: white; outline: none; transition: 0.2s;
    }

    #search:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px var(--accent-glow); }

    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

    .btn-random {
      background: var(--accent-color); color: white; border: none;
      padding: 0 1.5rem; border-radius: var(--radius-md);
      cursor: pointer; font-weight: 600; transition: 0.2s;
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }

    .btn-random:hover { background: var(--accent-secondary); transform: translateY(-2px); }

    /* Sections */
    main { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem 4rem; position: relative; z-index: 1; }

    .section-title {
      font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); margin: 2rem 0 1rem; display: flex; align-items: center; gap: 10px;
    }

    .section-title::after { content: ''; height: 1px; background: var(--card-border); flex-grow: 1; }

    #recent-container, #games-container {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem;
    }

    #recent-section:empty { display: none; }

    /* Cards */
    .game-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: var(--radius-md); padding: 2rem 1rem;
      text-decoration: none; color: var(--text-primary);
      text-align: center; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      animation: fadeInUp 0.4s ease forwards;
    }

    .game-card:hover {
      transform: translateY(-5px); border-color: var(--accent-color);
      background: #1c1c20; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }

    .card-icon { width: 40px; height: 40px; color: var(--text-secondary); transition: 0.3s; }
    .game-card:hover .card-icon { color: var(--accent-color); }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); grid-column: 1/-1; }
  </style>
</head>
<body>

<header>
  <h1>ZYNQ Games</h1>
  <div class="stats-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4m-2-2v4m7-1h.01"/></svg>
    <span id="count-text">Connecting...</span>
  </div>
</header>

<div class="controls-wrapper">
  <div class="search-container">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search games..." autocomplete="off">
  </div>
  <button class="btn-random" id="random-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 18h2.82a2 2 0 0 0 1.41-.59L13.41 10.2a2 2 0 0 1 1.41-.59H22"/><path d="m19 12 3-3-3-3"/><path d="M2 6h2.82a2 2 0 0 1 1.41.59l2.42 2.41"/><path d="m14.53 13.53 2.65 2.65a2 2 0 0 0 1.41.59H22"/><path d="m19 15 3 3-3 3"/></svg>
    Random
  </button>
</div>

<main>
  <div id="recent-wrapper" style="display: none; margin-bottom: 3rem;">
    <h2 class="section-title">Recently Played</h2>
    <div id="recent-container"></div>
  </div>

  <h2 class="section-title">All Games</h2>
  <div id="games-container">
    <div class="empty-state">Loading games...</div>
  </div>
</main>

<script>
  const container = document.getElementById('games-container');
  const recentContainer = document.getElementById('recent-container');
  const recentWrapper = document.getElementById('recent-wrapper');
  const searchInput = document.getElementById('search');
  const gameCountEl = document.getElementById('count-text');
  const randomBtn = document.getElementById('random-btn');

  let allGameData = {};
  let allGames = [];

  const cardIconSVG = `<svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4m-2-2v4"/><circle cx="17" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="13" r="1" fill="currentColor"/></svg>`;

  function formatName(name) {
    return name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function getGamePath(gameName) {
    return ['g1','g2','g3','g4'].find(g => allGameData[g]?.includes(gameName)) || 'g1';
  }

  function saveRecent(game) {
    let recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    recent = [game, ...recent.filter(g => g !== game)].slice(0, 5); // Keep top 5 unique
    localStorage.setItem('recentGames', JSON.stringify(recent));
    renderRecent();
  }

  function renderRecent() {
    const recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    if (recent.length === 0) {
      recentWrapper.style.display = 'none';
      return;
    }
    recentWrapper.style.display = 'block';
    recentContainer.innerHTML = '';
    recent.forEach(game => {
      recentContainer.appendChild(createGameCard(game));
    });
  }

  function createGameCard(game) {
    const link = document.createElement('a');
    link.href = `./${getGamePath(game)}/${game}`;
    link.target = "_blank";
    link.className = 'game-card';
    link.innerHTML = `${cardIconSVG}<span>${formatName(game)}</span>`;
    link.onclick = () => saveRecent(game);
    return link;
  }

  function renderGames(games) {
    container.innerHTML = '';
    if (games.length === 0) {
      container.innerHTML = '<div class="empty-state">No games found matches your search.</div>';
      return;
    }
    games.forEach(game => container.appendChild(createGameCard(game)));
  }

  async function init() {
    try {
      const response = await fetch('./games.json');
      allGameData = await response.json();
      allGames = Object.values(allGameData).flat();
      gameCountEl.textContent = `${allGames.length} Games Available`;
      renderGames(allGames);
      renderRecent();
    } catch (e) {
      gameCountEl.textContent = "Error loading games";
    }
  }

  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const filtered = allGames.filter(g => g.toLowerCase().includes(query));
    renderGames(filtered);
  });

  randomBtn.addEventListener('click', () => {
    if (allGames.length === 0) return;
    const randomGame = allGames[Math.floor(Math.random() * allGames.length)];
    saveRecent(randomGame);
    window.open(`./${getGamePath(randomGame)}/${randomGame}`, '_blank');
  });

  init();
</script>

</body>
</html>
