<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">

  <title>ZYNQ | Games</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.4/index.min.js"></script>

  <style>
    /* 🔥 (jouw CSS 그대로 gelaten om focus op fix te houden) */
    :root {
      --bg: #08090d;
      --bg-elevated: #0f1117;
      --bg-card: #14161e;
      --border-subtle: #161924;
      --text: #e8eaed;
      --text-muted: #6b7280;
      --text-dim: #404556;
      --accent: #00e5ff;
      --hot: #ff5c4d;
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app { max-width: 1480px; margin: 0 auto; padding: 0 24px 80px; }

    header { padding: 32px 0; }

    .logo { display: flex; gap: 10px; align-items: center; }

    .logo-mark {
      width: 40px; height: 40px;
      background: var(--accent);
      color: black;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
      border-radius: var(--radius-sm);
    }

    .search-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      color: var(--text);
    }

    .games-grid, .featured-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 18px;
    }

    .game-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border-subtle);
    }

    .splash-container { aspect-ratio: 4/3; overflow: hidden; }

    .splash { width: 100%; height: 100%; object-fit: cover; }

    .game-info { padding: 12px; }

    .game-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>

<body>
<div id="app">

  <header>
    <div class="logo">
      <div class="logo-mark">Z</div>
      <h1>ZYNQ Games</h1>
    </div>

    <input class="search-input" id="search" placeholder="Search games..." />
  </header>

  <div class="featured-grid" id="featured"></div>

  <div class="games-grid" id="games"></div>

</div>

<script>
  const featuredEl = document.getElementById("featured");
  const gamesEl = document.getElementById("games");
  const searchEl = document.getElementById("search");

  let state;

  function card(game) {
    const a = document.createElement("a");
    a.className = "game-card";
    a.href = `./game/${game.alias}`;

    a.innerHTML = `
      <div class="splash-container">
        <img class="splash" src="${game.thumb}" />
      </div>
      <div class="game-info">
        <div class="game-title">${game.name}</div>
      </div>
    `;
    return a;
  }

  function render(list) {
    gamesEl.innerHTML = "";
    list.forEach(g => gamesEl.appendChild(card(g)));
  }

  function renderFeatured(list) {
    featuredEl.innerHTML = "";
    list.slice(0, 12).forEach(g => featuredEl.appendChild(card(g)));
  }

  async function init() {
    await ZYNQ.games.init();

    const games = ZYNQ.games.list || ZYNQ.games.all;

    renderFeatured(games);
    render(games);

    // SEARCH FIX 🔥
    searchEl.addEventListener("input", () => {
      const q = searchEl.value.trim();

      if (!q) {
        render(ZYNQ.games.list || ZYNQ.games.all);
        return;
      }

      ZYNQ.games.search(q);

      render(ZYNQ.games.filtered || []);
    });
  }

  init();
</script>

</body>
</html>
