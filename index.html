<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">
  <title>ZYNQ (UN) - Dev Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;       /* GitHub Dark background */
      --bg-secondary: #161b22;   /* Secondary bg */
      --border-color: #30363d;   /* Borders */
      --text-primary: #e6edf3;   /* Main text */
      --text-secondary: #8b949e; /* Muted text */
      --accent-blue: #58a6ff;    /* Links/Accents */
      --accent-green: #3fb950;   /* Success/Status */
      --accent-purple: #a371f7;  /* Keywords */
      --accent-orange: #d29922;  /* Warnings/Highlight */
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 13px; /* Compact font size typical for IDEs */
    }

    /* Layout Structure */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header / Titlebar */
    .titlebar {
      background: var(--bg-secondary);
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .titlebar h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .titlebar h1 span {
      color: var(--accent-purple);
    }

    .env-badge {
      background: var(--accent-orange);
      color: #000;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-left: 0.5rem;
    }

    .meta-info {
      color: var(--text-secondary);
      font-size: 0.8rem;
      display: flex;
      gap: 1.5rem;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .meta-item strong { color: var(--text-primary); }

    /* Toolbar / Terminal Input */
    .toolbar {
      padding: 1rem 2rem;
      background: var(--bg-color);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .input-group {
      position: relative;
      flex-grow: 1;
      display: flex;
      align-items: center;
    }

    .prefix {
      color: var(--accent-green);
      margin-right: 0.5rem;
      font-weight: 500;
      user-select: none;
    }

    #search {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus {
      border-color: var(--accent-blue);
    }

    #search::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .btn-dev {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-dev:hover {
      background: var(--border-color);
      border-color: var(--text-secondary);
    }

    .btn-dev svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }

    /* Main Content Area */
    .main-content {
      flex-grow: 1;
      overflow-y: auto;
      padding: 0 2rem 2rem;
    }

    /* Section Headers */
    .section-header {
      position: sticky;
      top: 0;
      background: var(--bg-color);
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 0.5rem;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Table / List Styles */
    .list-container {
      display: flex;
      flex-direction: column;
    }

    .list-header {
      display: grid;
      grid-template-columns: 40px 2fr 1fr 120px;
      padding: 0.5rem 1rem;
      color: var(--text-secondary);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .list-row {
      display: grid;
      grid-template-columns: 40px 2fr 1fr 120px;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border-color);
      align-items: center;
      transition: background 0.15s;
    }

    .list-row:hover {
      background: var(--bg-secondary);
    }

    .col-status {
      width: 10px;
      height: 10px;
      background: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.4);
    }

    .col-name {
      color: var(--text-primary);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .col-path {
      color: var(--accent-blue);
      font-size: 0.85em;
      background: rgba(88, 166, 255, 0.1);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      width: fit-content;
    }

    .col-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .action-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-primary);
    }

    .action-btn.primary {
      background: var(--accent-green);
      color: #000;
      border-color: var(--accent-green);
      font-weight: 600;
    }

    .action-btn.primary:hover {
      filter: brightness(1.1);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Notification Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
      padding: 0.8rem 1.5rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Recent History styling (smaller) */
    #recent-section {
      margin-bottom: 2rem;
    }
    
    #recent-section .list-row {
      background: rgba(255, 255, 255, 0.02);
    }

  </style>
</head>
<body>

<div id="app">
  <!-- Title Bar -->
  <header class="titlebar">
    <h1>
      <span>&lt;</span> ZYNQ <span>/&gt;</span>
      <div class="env-badge">Dev Environment</div>
    </h1>
    <div class="meta-info">
      <div class="meta-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span>Uptime: <strong id="uptime">--</strong></span>
      </div>
      <div class="meta-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>Endpoints: <strong id="count-text">0</strong></span>
      </div>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="input-group">
      <span class="prefix">~$</span>
      <input type="text" id="search" placeholder="grep -i 'search games...' autocomplete="off">
    </div>
    <button class="btn-dev" id="random-btn" title="Open Random Endpoint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
      Randomize
    </button>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    
    <!-- Recent History (Debug Log) -->
    <div id="recent-wrapper" style="display: none;">
      <div class="section-header">
        <span>// Recent History (Local Storage)</span>
        <button class="action-btn" onclick="localStorage.clear(); location.reload();">Clear History</button>
      </div>
      <div class="list-container">
        <div class="list-header">
          <span>OK</span>
          <span>Name</span>
          <span>Endpoint</span>
          <span>Actions</span>
        </div>
        <div id="recent-container"></div>
      </div>
    </div>

    <!-- All Endpoints -->
    <div class="section-header">
      <span>// Available Endpoints</span>
    </div>
    
    <div class="list-container">
      <div class="list-header">
        <span>ST</span>
        <span>Service Name</span>
        <span>Path</span>
        <span>Actions</span>
      </div>
      <div id="games-container">
        <div class="empty-state">Loading manifest (games.json)...</div>
      </div>
    </div>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast">Copied to clipboard!</div>
</div>

<script>
  const container = document.getElementById('games-container');
  const recentContainer = document.getElementById('recent-container');
  const recentWrapper = document.getElementById('recent-wrapper');
  const searchInput = document.getElementById('search');
  const gameCountEl = document.getElementById('count-text');
  const randomBtn = document.getElementById('random-btn');
  const uptimeEl = document.getElementById('uptime');
  const toast = document.getElementById('toast');

  let allGameData = {};
  let allGames = [];

  // Uptime Counter
  let startTime = Date.now();
  setInterval(() => {
    let seconds = Math.floor((Date.now() - startTime) / 1000);
    uptimeEl.textContent = seconds + 's';
  }, 1000);

  // Format name for display
  function formatName(name) {
    // Returns raw looking name, but readable
    return name.replace(/-/g, '_'); 
  }

  // Get the folder path (g1, g2, etc.)
  function getGamePath(gameName) {
    return ['g1','g2','g3','g4'].find(g => allGameData[g]?.includes(gameName)) || 'g1';
  }

  // Toast notification
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Copy to Clipboard
  function copyPath(game) {
    const path = `/${getGamePath(game)}/${game}`;
    navigator.clipboard.writeText(window.location.origin + path).then(() => {
      showToast('URL Copied to clipboard!');
    });
  }

  function saveRecent(game) {
    let recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    recent = [game, ...recent.filter(g => g !== game)].slice(0, 3); // Keep 3
    localStorage.setItem('recentGames', JSON.stringify(recent));
    renderRecent();
  }

  function renderRecent() {
    const recent = JSON.parse(localStorage.getItem('recentGames') || '[]');
    if (recent.length === 0) {
      recentWrapper.style.display = 'none';
      return;
    }
    recentWrapper.style.display = 'block';
    recentContainer.innerHTML = '';
    recent.forEach(game => {
      recentContainer.appendChild(createGameRow(game, true));
    });
  }

  function createGameRow(game, isRecent = false) {
    const row = document.createElement('div');
    row.className = 'list-row';
    
    const pathFolder = getGamePath(game);
    const formattedName = formatName(game);
    
    row.innerHTML = `
      <div class="col-status" title="Status: Online"></div>
      <div class="col-name">${formattedName}</div>
      <div class="col-path">/${pathFolder}/${game}</div>
      <div class="col-actions">
        <button class="action-btn" onclick="event.stopPropagation(); copyPath('${game}')" title="Copy Path">CPY</button>
        <a href="./${pathFolder}/${game}" target="_blank" class="action-btn primary" onclick="saveRecent('${game}')">RUN</a>
      </div>
    `;
    return row;
  }

  function renderGames(games) {
    container.innerHTML = '';
    if (games.length === 0) {
      container.innerHTML = '<div class="empty-state">No endpoints found matching query.</div>';
      return;
    }
    // Append all rows
    const fragment = document.createDocumentFragment();
    games.forEach(game => fragment.appendChild(createGameRow(game)));
    container.appendChild(fragment);
  }

  async function init() {
    try {
      const response = await fetch('./games.json');
      allGameData = await response.json();
      allGames = Object.values(allGameData).flat();
      gameCountEl.textContent = allGames.length;
      renderGames(allGames);
      renderRecent();
    } catch (e) {
      container.innerHTML = `<div class="empty-state" style="color: #f85149;">Error: Failed to load games.json manifest.<br><code style="font-size:0.8em; color:var(--text-secondary);">${e}</code></div>`;
      gameCountEl.textContent = "Error";
    }
  }

  // Search Logic
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    const filtered = allGames.filter(g => g.toLowerCase().includes(query));
    renderGames(filtered);
  });

  // Random Logic
  randomBtn.addEventListener('click', () => {
    if (allGames.length === 0) return;
    const randomGame = allGames[Math.floor(Math.random() * allGames.length)];
    saveRecent(randomGame);
    const path = `/${getGamePath(randomGame)}/${randomGame}`;
    showToast(`Opening random service: ${randomGame}`);
    setTimeout(() => {
       window.open(`.${path}`, '_blank');
    }, 300); // Small delay to show toast
  });

  init();
</script>

</body>
</html>
