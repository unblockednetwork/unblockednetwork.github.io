<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo.svg">
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "e7ca3a68f0c04656baf422e837d316d4"}'></script>

  <title>ZYNQ | Games</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.4/index.min.js"></script>

  <style>
    :root {
      --bg: #08090d;
      --bg-elevated: #0f1117;
      --bg-card: #14161e;
      --border: #1e2230;
      --border-subtle: #161924;
      --text: #e8eaed;
      --text-muted: #6b7280;
      --text-dim: #404556;
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.25);
      --accent-soft: rgba(0, 229, 255, 0.08);
      --hot: #ff5c4d;
      --hot-glow: rgba(255, 92, 77, 0.25);
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(255, 92, 77, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    #app {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    header {
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 32px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, #00b8d4 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--bg);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
    }

    .logo-text span { color: var(--text-muted); font-weight: 400; }

    .search-section { display: flex; gap: 12px; }

    .search-wrapper { flex: 1; position: relative; }

    .search-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
    }

    .btn-random {
      background: linear-gradient(135deg, var(--hot) 0%, #ff7a6b 100%);
      border: none;
      color: white;
      padding: 0 24px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
    }

    .games-grid, .featured-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 18px;
    }

    .game-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      transition: 0.25s;
    }

    .game-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
    }

    .splash-container { position: relative; padding-top: 75%; }

    .splash {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .game-info { padding: 16px; }

    .game-title {
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px;
      color: var(--text-dim);
    }
  </style>
</head>

<body>
<div id="app">

  <header>
    <div class="header-top">
      <div class="logo">
        <div class="logo-mark">Z</div>
        <div class="logo-text">ZYNQ <span>Games</span></div>
      </div>

      <div style="color: var(--text-muted)">
        <strong id="count-text">0</strong> games
      </div>
    </div>

    <div class="search-section">
      <input type="text" class="search-input" id="search" placeholder="Search games...">
      <button class="btn-random" id="random-btn">🎲 I'm bored</button>
    </div>
  </header>

  <div class="featured-grid" id="featured-container"></div>
  <div class="games-grid" id="games-container"></div>

</div>

<script>
  const featuredContainer = document.getElementById('featured-container');
  const gamesContainer = document.getElementById('games-container');
  const searchInput = document.getElementById('search');
  const countEl = document.getElementById('count-text');
  const randomBtn = document.getElementById('random-btn');

  let allGames = [];

  function card(game) {
    const a = document.createElement('a');
    a.className = 'game-card';
    a.href = `./game/${game.alias}`;

    a.innerHTML = `
      <div class="splash-container">
        <img src="${game.thumb || game.splash}" class="splash">
      </div>
      <div class="game-info">
        <div class="game-title">${game.name}</div>
      </div>
    `;
    return a;
  }

  function render(list) {
    gamesContainer.innerHTML = '';

    if (!list.length) {
      gamesContainer.innerHTML = `<div class="empty-state">Geen games gevonden</div>`;
      return;
    }

    list.forEach(g => gamesContainer.appendChild(card(g)));
  }

  function renderFeatured(list) {
    featuredContainer.innerHTML = '';
    list.slice(0, 12).forEach(g => featuredContainer.appendChild(card(g)));
  }

  async function init() {
    await ZYNQ.games.init();

    // ✅ FIX: juiste source volgens docs
    allGames = ZYNQ.games.list || ZYNQ.games.all;

    countEl.textContent = allGames.length;

    renderFeatured(allGames);
    render(allGames);

    // 🔥 FIX SEARCH (dit was je bug)
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();

      if (!q) return render(allGames);

      ZYNQ.games.search(q);

      // filtered state is correct resultaat
      render(ZYNQ.games.filtered || []);
    });

    // 🎲 random fix
    randomBtn.addEventListener('click', () => {
      const g = ZYNQ.games.getRandomOne?.();
      if (!g) return;

      window.location.href = `./game/${g.alias}`;
    });
  }

  init();
</script>

</body>
</html>
