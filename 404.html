<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Game Loader</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="content">Laden...</div>

    <script>
        const path = window.location.pathname;

        function load404() {
            fetch("/404-main.txt")
                .then(res => res.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => {
                    document.body.innerHTML = "404 kon niet geladen worden 😢";
                });
        }

        // Alleen paths die met /game/ beginnen worden behandeld
        if (path.startsWith("/game/")) {
            const suffix = path.slice(6); // alles na /game/
            
            if (!suffix) {
                // /game/ → redirect naar /
                window.location.href = "/";
            } else {
                // fetch games.json
                fetch("/games.json")
                    .then(res => res.json())
                    .then(data => {
                        // zoek in alle groepen g1-g4
                        let found = false;
                        for (const group in data) {
                            if (data[group].includes(suffix)) {
                                found = true;
                                // laad iframe fullscreen
                                document.body.innerHTML = `
                                    <iframe src="/games/${group}/${suffix}/"></iframe>
                                `;
                                break;
                            }
                        }
                        if (!found) {
                            load404();
                        }
                    })
                    .catch(() => load404());
            }
        } else {
            // path niet /game/... → 404
            load404();
        }
    </script>
</body>
</html>
