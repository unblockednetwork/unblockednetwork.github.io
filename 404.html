<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Game Router</title>
</head>
<body>
    <div id="content">Laden...</div>

    <script>
        const path = window.location.pathname;
        const prefix = "/game/";

        if (path.includes(prefix) && path.split(prefix)[1]) {
            // Er is een path na /game/
            const gamePath = path.split(prefix)[1];
            document.getElementById("content").textContent = gamePath;
        } else {
            // Geen path → fetch 404-main.txt en vervang hele pagina
            fetch("/404-main.txt")
                .then(res => res.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => {
                    document.getElementById("content").textContent = "Kon 404 pagina niet laden 😢";
                });
        }
    </script>
</body>
</html>
