<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token": "e7ca3a68f0c04656baf422e837d316d4"}'></script>

  <link rel="icon" href="/logo.svg">
  <title>UN | ZYNQ</title>

  <!-- ZYNQ ENGINE (UPDATED CDN) -->
  <script src="https://cdn.jsdelivr.net/gh/un-zynq/zynq-lib@1.1.5/index.min.js"></script>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00e68a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #content {
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #content.visible {
      opacity: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .error-code {
      font-size: clamp(100px, 15vw, 150px);
      font-weight: 900;
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .error-title {
      font-size: 24px;
      margin: 10px 0;
    }

    .error-msg {
      opacity: 0.5;
      margin-bottom: 30px;
      max-width: 420px;
    }

    .btn-home {
      padding: 12px 28px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .btn-home:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="color:#666;font-size:14px;">Loading game...</div>
</div>

<div id="content"></div>

<script type="module">
  const loader = document.getElementById('loader');
  const content = document.getElementById('content');

  function reveal() {
    loader.classList.add('hidden');
    content.classList.add('visible');
  }

  function show404() {
    document.title = "404 - Game Not Found";

    content.innerHTML = `
      <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Game Not Found</h1>
        <p class="error-msg">This game doesn't exist or failed to load.</p>
        <a class="btn-home" href="/">Back to Home</a>
      </div>
    `;

    reveal();
  }

  async function loadGame() {
    const path = window.location.pathname;

    if (!path.startsWith('/game/')) return show404();

    const alias = path.split('/').filter(Boolean)[1];
    if (!alias) return show404();

    try {
      // 🔥 SAFE ENGINE LOADING (1.1.3 compat)
      const Z = window.ZYNQ || window.HRN;

      if (!Z) throw new Error("ZYNQ engine not found");

      await Z.games.init?.({version:"888ee07fb7e0ae9dd8a5faedc01e2847879af1e5"});

      const game =
        Z.games.getByAlias?.(alias) ||
        Z.get?.(alias);

      if (!game?.url) return show404();

      const iframe = document.createElement('iframe');

      // clean URL fix
      const url = game.url.startsWith('/')
        ? game.url
        : '/' + game.url;

      iframe.src = url;
      iframe.allow =
        "fullscreen; accelerometer; gyroscope; autoplay; encrypted-media";

      iframe.onload = () => reveal();

      // fallback no matter what
      setTimeout(reveal, 6000);

      content.appendChild(iframe);

      document.title = `${game.name} - ZYNQ`;

    } catch (err) {
      console.error("Game load error:", err);
      show404();
    }
  }

  loadGame();
</script>

</body>
</html>
