<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Game Loader</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div id="content">Laden...</div>

    <script>
        const path = window.location.pathname;

        // redirect /game/ → /
        if (path === "/game/" || path === "/game") {
            window.location.href = "/";
        }

        // fetch games.json
        fetch("/games.json")
            .then(res => res.json())
            .then(data => {
                // verwacht formaat: /g1/naam
                const parts = path.split("/").filter(Boolean);

                if (parts.length === 2) {
                    const group = parts[0]; // g1, g2, g3, g4
                    const gameName = parts[1];

                    if (data[group] && data[group].includes(gameName)) {
                        // Game bestaat → iframe laden
                        document.body.innerHTML = `
                            <iframe src="/games/${group}/${gameName}/"></iframe>
                        `;
                        return;
                    }
                }

                // Anders → 404 laden
                load404();
            })
            .catch(() => load404());

        function load404() {
            fetch("/404-main.txt")
                .then(res => res.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => {
                    document.body.innerHTML = "404 kon niet geladen worden 😢";
                });
        }
    </script>
</body>
</html>
